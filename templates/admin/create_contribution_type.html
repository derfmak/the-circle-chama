{% extends 'base.html' %}

{% block title %}Create Contribution Type - THE CIRCLE{% endblock %}

{% block content %}
<section class="page-header">
    <h1>Create Contribution Type</h1>
    <a href="{% url 'admin_contributions' %}" class="btn btn-secondary">Back</a>
</section>

<section class="content-section">
    <form method="post" class="admin-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="contribution_type">Type *</label>
            <select id="contribution_type" name="contribution_type" class="form-control" required>
                <option value="monthly">Monthly</option>
                <option value="quarterly">Quarterly</option>
                <option value="registration">Registration</option>
                <option value="meeting">Meeting</option>
                <option value="custom">Custom</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="amount">Amount (KES) *</label>
            <input type="number" id="amount" name="amount" class="form-control" step="0.01" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control" rows="3"></textarea>
        </div>
        
        <div class="form-group">
            <label for="deadline_day">Deadline Day (optional)</label>
            <input type="number" id="deadline_day" name="deadline_day" class="form-control" min="1" max="31">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create</button>
            <a href="{% url 'admin_contributions' %}" class="btn btn-link">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
