{% extends 'base.html' %}

{% block title %}Edit Contribution - THE CIRCLE{% endblock %}

{% block content %}
<section class="page-header">
    <h1>Edit Contribution</h1>
    <p>{{ contribution.user.get_full_name }} - {{ contribution.contribution_type.name }}</p>
</section>

<section class="content-section">
    <form method="post" class="admin-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="amount_due">Amount Due</label>
            <input type="number" id="amount_due" name="amount_due" class="form-control" 
                   value="{{ contribution.amount_due }}" step="0.01">
        </div>
        
        <div class="form-group">
            <label for="fine_amount">Fine Amount</label>
            <input type="number" id="fine_amount" name="fine_amount" class="form-control" 
                   value="{{ contribution.fine_amount }}" step="0.01">
        </div>
        
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" class="form-control">
                <option value="pending" {% if contribution.status == 'pending' %}selected{% endif %}>Pending</option>
                <option value="paid" {% if contribution.status == 'paid' %}selected{% endif %}>Paid</option>
                <option value="paid_late" {% if contribution.status == 'paid_late' %}selected{% endif %}>Paid Late</option>
                <option value="partial" {% if contribution.status == 'partial' %}selected{% endif %}>Partial</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'admin_contributions' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
