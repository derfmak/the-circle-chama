{% extends 'base.html' %}

{% block title %}Edit Member - THE CIRCLE{% endblock %}

{% block content %}
<section class="page-header">
    <h1>Edit Member</h1>
    <p>{{ member.get_full_name }} - {{ member.email }}</p>
</section>

<section class="content-section">
    <form method="post" class="admin-form">
        {% csrf_token %}
        
        <div class="form-section">
            <h3>Personal Information</h3>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" class="form-control" 
                           value="{{ member.first_name }}" required>
                </div>
                
                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" class="form-control" 
                           value="{{ member.last_name }}" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="phone_number">Phone Number</label>
                <input type="text" id="phone_number" name="phone_number" class="form-control" 
                       value="{{ member.phone_number }}" required>
            </div>
        </div>
        
        <div class="form-section">
            <h3>Account Status</h3>
            
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="is_active" {% if member.is_active %}checked{% endif %}>
                    <span>Account Active</span>
                </label>
            </div>
            
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="is_dropped" {% if member.memberprofile.is_dropped %}checked{% endif %}>
                    <span>Member Dropped</span>
                </label>
                <small class="form-hint">Dropped members cannot login but records are preserved.</small>
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'admin_members_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
