services:
  - type: web
    name: the-circle-chama
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"
      - key: DATABASE_URL
        fromDatabase:
          name: the-circle-db
          property: connectionString
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "The Circle <noreply@the-circle.onrender.com>"
      - key: ADMIN_EMAIL
        value: "admin@the-circle.onrender.com"
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_ENVIRONMENT
        value: "sandbox"

databases:
  - name: the-circle-db
    databaseName: the_circle
    user: the_circle_user
    plan: free